<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotori's Colorful Seika</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-layer"></div>
    <div id="particles"></div>

    <div id="app">
        <header id="header">
            <div class="header-left">
                <h1 class="site-title">Kotori's Colorful Seika</h1>
                <p class="subtitle">Learning is a colorful journey</p>
            </div>
            <div class="header-right">
                <a href="https://bangumi.tv/user/1151382" class="header-btn" target="_blank" title="Bangumi">
                    <span class="btn-icon">📺</span> Bangumi
                </a>
                <a id="obsidian-link" class="header-btn" title="Obsidian笔记">
                    <span class="btn-icon">📒</span> Obsidian
                </a>
                <button id="settings-btn" class="header-btn" title="设置">
                    <span class="btn-icon">⚙️</span> 设置
                </button>
                <button id="bg-view-btn" class="header-btn" title="观赏背景">
                    <span class="btn-icon">🖼️</span> 观赏
                </button>
            </div>
        </header>

        <div class="main-layout">
            <aside id="sidebar">
                <div class="sidebar-section">
                    <h3>📚 学科领域</h3>
                    <div id="subject-nav" class="subject-nav">
                        <div class="subject-group">
                            <div class="subject-group-header">📐 数学</div>
                            <button class="subject-btn sub active" data-subject="math-analysis"><span class="subj-icon">📊</span> 数分</button>
                            <button class="subject-btn sub" data-subject="math-linalg"><span class="subj-icon">📏</span> 高代</button>
                        </div>
                        <div class="subject-group">
                            <div class="subject-group-header">⚛️ 物理</div>
                            <button class="subject-btn sub" data-subject="physics-mech"><span class="subj-icon">🔧</span> 力学</button>
                            <button class="subject-btn sub" data-subject="physics-elec"><span class="subj-icon">⚡</span> 电学</button>
                        </div>
                        <button class="subject-btn" data-subject="cs"><span class="subj-icon">💻</span> 程设</button>
                        <button class="subject-btn" data-subject="ai"><span class="subj-icon">🤖</span> AI引论</button>
                        <a class="subject-btn subject-link" href="https://Kotori-cjk.github.io/luogu-journey/" target="_blank"><span class="subj-icon">🏆</span> 算法 ↗</a>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>📋 今日待办</h3>
                    <div id="task-summary" class="task-summary">
                        <span id="task-count">0 项待办</span>
                    </div>
                    <button class="subject-btn task-nav-btn" data-subject="tasks"><span class="subj-icon">✅</span> 任务面板</button>
                </div>

                <div class="sidebar-section music-section">
                    <h3>🎵 音乐</h3>
                    <div id="music-container">
                        <p class="empty-hint">在设置中添加网易云音乐~</p>
                    </div>
                </div>
                <div class="save-indicator" id="save-indicator">💾 就绪</div>
            </aside>

            <main id="main-content">
                <!-- Subject header with links -->
                <div id="subject-header" class="subject-header"></div>

                <!-- Tab area: notes view -->
                <div id="view-notes" class="view-content active"></div>

                <!-- Task view (shown when "tasks" is selected) -->
                <div id="view-tasks" class="view-content"></div>
            </main>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 设置</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-group">
                    <h3>📒 Obsidian</h3>
                    <label>Vault 名称</label>
                    <input type="text" id="set-obsidian-vault" placeholder="Obsidian Vault">
                    <label>📊 数分 笔记文件夹</label>
                    <input type="text" id="set-obs-math-analysis" placeholder="例：数分">
                    <label>📏 高代 笔记文件夹</label>
                    <input type="text" id="set-obs-math-linalg" placeholder="例：高代">
                    <label>🔧 力学 笔记文件夹</label>
                    <input type="text" id="set-obs-physics-mech" placeholder="例：力学">
                    <label>⚡ 电学 笔记文件夹</label>
                    <input type="text" id="set-obs-physics-elec" placeholder="例：电学">
                    <label>💻 程设 笔记文件夹</label>
                    <input type="text" id="set-obs-cs" placeholder="例：程设">
                    <label>🤖 AI引论 笔记文件夹</label>
                    <input type="text" id="set-obs-ai" placeholder="例：AI引论">
                </div>
                <div class="settings-group">
                    <h3>🔗 NotebookLM 链接</h3>
                    <label>📊 数分</label>
                    <input type="text" id="set-nlm-math-analysis" placeholder="NotebookLM URL">
                    <label>📏 高代</label>
                    <input type="text" id="set-nlm-math-linalg" placeholder="NotebookLM URL">
                    <label>🔧 力学</label>
                    <input type="text" id="set-nlm-physics-mech" placeholder="NotebookLM URL">
                    <label>⚡ 电学</label>
                    <input type="text" id="set-nlm-physics-elec" placeholder="NotebookLM URL">
                    <label>💻 程设</label>
                    <input type="text" id="set-nlm-cs" placeholder="NotebookLM URL">
                    <label>🤖 AI引论</label>
                    <input type="text" id="set-nlm-ai" placeholder="NotebookLM URL">
                </div>
                <div class="settings-group">
                    <h3>🎨 背景图片</h3>
                    <div class="bg-upload-area">
                        <input type="file" id="bg-upload" accept="image/*" multiple hidden>
                        <button class="btn btn-accent" onclick="document.getElementById('bg-upload').click()">📷 上传图片</button>
                        <span class="upload-hint">支持多张切换</span>
                    </div>
                    <div id="bg-preview-list" class="bg-preview-list"></div>
                    <button id="bg-reset-btn" class="btn btn-secondary">恢复默认背景</button>
                </div>
                <div class="settings-group">
                    <h3>🎵 网易云音乐</h3>
                    <div class="music-add-row">
                        <input type="text" id="music-input" placeholder="粘贴歌曲链接或ID">
                        <button id="music-add-btn" class="btn btn-primary">添加</button>
                    </div>
                    <div id="music-manage-list" class="music-manage-list"></div>
                </div>
                <div class="settings-group">
                    <h3>💾 数据管理</h3>
                    <div class="data-actions">
                        <button id="export-btn" class="btn btn-secondary">📤 导出数据</button>
                        <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📥 导入数据</button>
                        <input type="file" id="import-file" accept=".json" hidden>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="seed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <button class="bg-view-exit" id="bg-view-exit">🖼️ 点击或按 Esc 退出观赏</button>
    <div class="save-toast" id="save-toast"></div>
    <script src="app.js"></script>
</body>
</html>
